name: Publish to PyPI

# Publishes to PyPI on a GitHub Release or manual dispatch.
# Select TestPyPI explicitly from the manual-dispatch dropdown for test uploads.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time setup: on PyPI, add a trusted publisher for this repository with
# workflow "publish.yml" and environment "pypi" (and "testpypi" on TestPyPI).
# See https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: pypi
        type: choice
        options: [pypi, testpypi]

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  testpypi:
    name: publish to TestPyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: publish to PyPI
    needs: build
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'testpypi') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
